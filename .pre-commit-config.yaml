repos:
  # ── Formatage ──────────────────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        name: black (format Python)
        files: ^backends/static/
        args: [--config, backends/pyproject.toml]

  # ── Linting ────────────────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        name: flake8 (lint Python)
        files: ^backends/static/
        args: [--config, backends/.flake8]

  # ── Type checking ──────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        name: mypy (type check Python)
        files: ^backends/static/(?!tests/).*\.py$
        args: [--config-file, backends/pyproject.toml]
        additional_dependencies:
          - lief
          - capstone

  # ── Checks généraux ────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
