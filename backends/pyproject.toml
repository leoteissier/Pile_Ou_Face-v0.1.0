[tool.mypy]
python_version = "3.11"
strict = false
warn_unreachable = true 
show_error_codes = true  
ignore_missing_imports = true
warn_return_any = true
disallow_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = false
exclude = [
    "static/tests/",
    "venv/",
    "\\.venv/",
]

# lief ships incomplete stubs — suppress attr/assignment errors in lief-heavy modules
[[tool.mypy.overrides]]
module = ["backends.static.*"]
ignore_errors = true

[tool.black]
line-length = 88
target-version = ["py310", "py311", "py312"]
include = '\.pyi?$'
extend-exclude = '''
/(
  venv
  | \.venv
  | node_modules
)/
'''
